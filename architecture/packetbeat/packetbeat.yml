packetbeat.interfaces.device: br-0086e34288c2

packetbeat.interfaces.bpf_filter: "host 172.18.0.2"

packetbeat.protocols:
  - type: dns
    ports: [53]
    include_authorities: true
  - type: http
    ports: [80, 8080, 3000]
    include_body_for: ["text/html", "application/json"]
    hide_keywords: ["image", "css", "js", "woff", "png", "svg"]
    send_headers: ["Host", "Referer", "User-Agent", "Location"]
  - type: tls
    ports: [443]

setup.kibana:
  host: "localhost:5601"
setup.dashboards.enabled: true

output.elasticsearch:
  hosts: ["${ELASTICSEARCH_HOSTS}"]

compression_level: 6

logging.level: info