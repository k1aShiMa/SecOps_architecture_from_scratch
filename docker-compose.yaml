version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:6.8.23
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 2GB
    volumes:
      - ./architecture/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - cyber-lab

  kibana:
    image: docker.elastic.co/kibana/kibana:6.8.23
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - cyber-lab

  thehive:
    image: thehiveproject/thehive:3.5.0
    container_name: thehive
    depends_on:
      - elasticsearch
      - cassandra
    ports:
      - "9000:9000"
    command:
      - --search-backend
      - elasticsearch
      - --elastic-nodes
      - elasticsearch:9200
      - --search-index
      - thehive
    networks:
      - cyber-lab

  n8n:
     image: n8nio/n8n:latest
     container_name: n8n
     ports:
       - "5678:5678"
     networks:
       - cyber-lab

  evilginx:
    build: ./architecture/evilginx_source
    container_name: evilginx
    stdin_open: true
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./architecture/evilginx:/root/.evilginx
    networks:
      - cyber-lab

  victim-machine:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: victim-machine
    security_opt:
      - seccomp:unconfined
    ports:
      - "3000:3000"
    shm_size: "1gb"
    volumes:
      - ./architecture/victim/config:/config
      - ./architecture/victim/logs:/var/log/victim_activity
    networks:
      - cyber-lab

  filebeat:
    image: docker.elastic.co/beats/filebeat:6.8.23
    container_name: filebeat
    user: root
    volumes:
      - ./architecture/victim/logs:/var/log/victim:ro
      - ./architecture/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - elasticsearch
    networks:
      - cyber-lab

networks:
  cyber-lab:
    driver: bridge